name: Update Podkop custom lists

on:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build lists
        run: python3 build.py

      - name: Commit generated lists
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add dist/special.lst dist/russia-inside-custom.lst

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update Podkop custom lists"
          git push
